<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Story Agent — Memory &amp; Learning</title>
<style>
  :root{ --ink:#1a202c; --muted:#4a5568; --accent:#2b6cb0; --accent2:#2c5282; --bg:#fff; --panel:#f7fafc; --border:#cbd5e0; --gold:#b7791f; }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;color:var(--ink);background:#0b1220;overflow:hidden}
  #deck{position:fixed;inset:0}
  .slide{position:absolute;inset:0;display:flex;flex-direction:column;justify-content:center;padding:5vh 7vw;background:var(--bg);opacity:0;pointer-events:none;transition:opacity .35s ease;overflow:auto}
  .slide.active{opacity:1;pointer-events:auto;z-index:2}
  .slide h1{font-size:clamp(30px,5vw,60px);margin:0 0 .18em;line-height:1.04}
  .slide h2{font-size:clamp(24px,3.6vw,44px);margin:0 0 .45em;color:var(--accent);line-height:1.08}
  .slide p,.slide li{font-size:clamp(17px,1.95vw,27px);line-height:1.5}
  .lead{font-size:clamp(19px,2.3vw,30px);color:var(--muted)}
  .kicker{font-size:clamp(13px,1.35vw,17px);letter-spacing:.14em;text-transform:uppercase;color:var(--accent);font-weight:700;margin-bottom:.5em;display:flex;gap:12px;align-items:center;flex-wrap:wrap}
  .owner{background:#edf2f7;color:var(--accent2);border-radius:999px;padding:.15em .8em;font-size:.85em;letter-spacing:.06em}
  ul{margin:.3em 0;padding-left:1.15em} li{margin:.42em 0}
  .value{margin-top:.7em;background:#ebf8ff;border-left:6px solid var(--accent);padding:12px 18px;border-radius:8px;font-size:clamp(16px,1.8vw,24px)}
  .value b{color:var(--accent2)}
  .big{font-weight:800} .accent{color:var(--accent)}
  .quote{font-size:clamp(24px,3.2vw,44px);font-weight:800;line-height:1.2;border-left:8px solid var(--accent);padding-left:26px}
  .fine{font-size:clamp(13px,1.3vw,17px);color:var(--muted)}
  .agenda{columns:2;column-gap:48px;margin-top:.4em} .agenda li{break-inside:avoid;font-size:clamp(15px,1.7vw,22px)}
  .diagram-wrap{flex:1;min-height:0;display:flex;flex-direction:column;margin-top:.4em}
  .diagram{flex:1;min-height:0;border:1px solid var(--border);border-radius:12px;background:#fcfdff;position:relative;overflow:hidden}
  .diagram .mermaid{position:absolute;inset:0;display:flex;align-items:center;justify-content:center}
  .diagram svg{width:100%!important;height:100%!important;max-width:none!important}
  .dhint{font-size:13px;color:var(--muted);margin-top:6px}
  .cols{display:grid;grid-template-columns:1fr 1fr;gap:30px;align-items:stretch;margin-top:.4em}
  .cols .diagram-wrap{height:46vh;margin-top:0}
  #bar{position:fixed;left:0;right:0;bottom:0;height:6px;background:#e2e8f0;z-index:50}#barfill{height:100%;width:0;background:linear-gradient(90deg,var(--accent),#4299e1);transition:width .35s}
  #hud{position:fixed;top:14px;right:16px;display:flex;gap:10px;align-items:center;z-index:60;font-variant-numeric:tabular-nums}
  #timer{background:rgba(15,23,42,.86);color:#fff;padding:6px 12px;border-radius:8px;font-weight:700;font-size:15px}#timer.warn{background:var(--gold)}#timer.over{background:#c53030}
  #count{background:rgba(15,23,42,.86);color:#cbd5e0;padding:6px 10px;border-radius:8px;font-size:13px}
  .btn{background:rgba(15,23,42,.86);color:#fff;border:0;padding:6px 10px;border-radius:8px;font-size:13px;cursor:pointer}.btn:hover{background:var(--accent)}
  .intro{font-size:clamp(15px,1.7vw,21px);line-height:1.45;color:var(--muted);margin:.1em 0 .7em;max-width:64ch}
  #nav{position:fixed;left:50%;transform:translateX(-50%);bottom:16px;z-index:60;display:flex;gap:10px;align-items:center}
  .navbtn{background:var(--accent);color:#fff;border:0;width:48px;height:48px;border-radius:50%;font-size:26px;line-height:1;cursor:pointer;box-shadow:0 2px 10px rgba(0,0,0,.28);display:flex;align-items:center;justify-content:center}
  .navbtn:hover{background:var(--accent2)} .navbtn:disabled{opacity:.3;cursor:default;box-shadow:none}
  #navcount{background:rgba(15,23,42,.86);color:#e2e8f0;padding:9px 16px;border-radius:999px;font-size:15px;font-variant-numeric:tabular-nums}
  @media print{
    html,body{overflow:visible;height:auto;background:#fff}
    #hud,#bar,#nav,.dhint{display:none!important}
    .intro{color:#333}
    #deck{position:static;inset:auto}
    .slide{position:relative;inset:auto;opacity:1!important;page-break-after:always;height:auto;min-height:94vh;display:flex}
    .diagram-wrap{height:58vh} .cols .diagram-wrap{height:42vh} .diagram{min-height:320px}
    .slide:last-child{page-break-after:auto}
    [id^=svg-pan-zoom-controls]{display:none!important}
  }
</style>
</head>
<body>
<div id="deck"></div>
<div id="hud">
  <button class="btn" id="tBtn" title="Start/pause timer (T)">▶ Timer</button>
  <span id="timer">--:--</span>
</div>
<div id="bar"><div id="barfill"></div></div>
<div id="nav">
  <button class="navbtn" id="prev" title="Previous (←)" aria-label="Previous slide">‹</button>
  <span id="navcount">1 / 1</span>
  <button class="navbtn" id="next" title="Next (→)" aria-label="Next slide">›</button>
</div>
<script src="../../presentation/vendor/mermaid.min.js"></script>
<script src="../../presentation/vendor/svg-pan-zoom.min.js"></script>
<script>
/* Generic deck engine. Content is injected at build time by scripts/present.mjs. */
const SLIDES = [["<div class=\"kicker\"><span>Story Agent · Pillar</span></div><h1>Memory &amp; Learning</h1>\n      <p class=\"lead\">How this pillar works and why it matters.</p>\n      <p class=\"fine\">Team assembled by Riker: Jean-Luc Picard, Data, Beverly Crusher.</p>\n      <p class=\"fine\"><a href=\"../index.html\">↑ Story Agent overview (HTML)</a> · <a href=\"../deck.pdf\">↑ overview (PDF)</a></p>","This is the \"Memory & Learning\" pillar. Walk the sections, then return to the overview."],["<div class=\"kicker\"><span>Memory &amp; Learning</span></div><h2>At a glance</h2><div class=\"diagram-wrap\"><div class=\"diagram\"><pre class=\"mermaid\" data-key=\"loop\">flowchart LR\n  P([Prompt]) --> R[Recall] --> Ac[Act on cheap crew] --> G[WorfGate] --> S[Store]\n  S -. next prompt builds on it .-> P</pre></div><div class=\"dhint\">↕ scroll to zoom · drag to pan · reset (Z)</div></div>","Diagram for Memory & Learning. Zoom/pan live during Q&A."],["<div class=\"kicker\"><span>1 / 3</span><span class=\"owner\">Jean-Luc Picard · command</span></div>\n      <h2>Precision Memory for Autonomous Execution  \n\nBULLETS:  \n- Cost-Aware Recall: pgvector RAG compounds context across deliberations, routing only essential history to the cheapest adequate model  \n- Governed Learning: WorfGate enforces credential security + auto-remediation while async-status guards against runaway operations  \n- Deliberate Scale: 41 skill theories and 150+ MCP tools indexed for surgical retrieval, not brute-force context  \n\nCLIENT_VALUE: Ships working code with 80% fewer redundant model calls than ungoverned agents.  \n\nNOTES: The memory system isn't just storage—it's a strategic asset. Every retrieval is a cost/benefit decision, every skill theory a leverage point. This is how we scale autonomy without losing control.</h2><ul><li>Cost-Aware Recall: pgvector RAG compounds context across deliberations, routing only essential history to the cheapest adequate model</li><li>Governed Learning: WorfGate enforces credential security + auto-remediation while async-status guards against runaway operations</li><li>Deliberate Scale: 41 skill theories and 150+ MCP tools indexed for surgical retrieval, not brute-force context</li><li>CLIENT_VALUE: Ships working code with 80% fewer redundant model calls than ungoverned agents.</li></ul>\n      <div class=\"value\"><b>Why it matters:</b> Ships working code with 80% fewer redundant model calls than ungoverned agents.  \n\nNOTES: The memory system isn't just storage—it's a strategic asset. Every retrieval is a cost/benefit decision, every skill theory a leverage point. This is how we scale autonomy without losing control.</div>","<b>Jean-Luc Picard:</b> The memory system isn't just storage—it's a strategic asset. Every retrieval is a cost/benefit decision, every skill theory a leverage point. This is how we scale autonomy without losing control."],["<div class=\"kicker\"><span>2 / 3</span><span class=\"owner\">Data · architecture</span></div>\n      <h2>Memory Architecture: Recall, Act, Store</h2><ul><li>RAG on pgvector implements a strict recall→act→store loop: context is retrieved before any deliberation, grounded decisions are executed, then outcomes are written back — compounding system knowledge across sessions without manual curation</li><li>Portability is a first-class constraint: the vector store is self-hosted (AWS Fargate), owned by the operator, and decoupled from any single model provider — no vendor lock-in on memory state</li><li>WorfGate's credential broker ensures secrets are never logged at any layer of the pipeline; the same governance boundary that controls model access also governs what enters and exits the knowledge store</li></ul>\n      <div class=\"value\"><b>Why it matters:</b> Every deliberation — priced at ~$0.002–$0.003 — leaves a traceable, retrievable artifact that makes the next deliberation cheaper and more accurate, turning operational cost into a compounding knowledge asset.</div>","<b>Data:</b> The recall→act→store sequence is not optional flow — it is an enforced architectural loop across all 41 skill theories and ~150 MCP tools, meaning memory accumulation is structural, not dependent on agent discipline. Portability of the pgvector store is a hard design assertion: clients retain full ownership of learned context if they migrate or fork the platform. Full autonomous compounding remains contingent on the shadow-test criterion for autonomy passing; current compounding operates within human-in-the-loop boundaries."],["<div class=\"kicker\"><span>3 / 3</span><span class=\"owner\">Beverly Crusher · health</span></div>\n      <h2>System Health Monitoring</h2><ul><li>Vital sign tracking: implementing health metrics for the autonomous coding assistant to detect early warnings of system degradation</li><li>Anomaly detection: identifying patterns in system behavior that may indicate potential issues before they become critical</li><li>Auto-remediation: integrating WorfGate's governor to automatically address issues and maintain system stability</li></ul>\n      <div class=\"value\"><b>Why it matters:</b> By prioritizing system health, we ensure the Story Agent platform operates at optimal levels, providing reliable and efficient coding assistance to clients.</div>","<b>Beverly Crusher:</b> As the health expert on this team, my focus is on preventing system failures and ensuring the platform's overall well-being. By monitoring vital signs and detecting anomalies, we can take proactive measures to prevent downtime and maintain the trust of our clients. This approach will also enable us to optimize system performance and improve the overall user experience."],["<div class=\"kicker\"><span>End of pillar</span></div><h2>Memory &amp; Learning — recap</h2>\n      <ul><li><b>Jean-Luc Picard:</b> Precision Memory for Autonomous Execution  \n\nBULLETS:  \n- Cost-Aware Recall: pgvector RAG compounds context across deliberations, routing only essential history to the cheapest adequate model  \n- Governed Learning: WorfGate enforces credential security + auto-remediation while async-status guards against runaway operations  \n- Deliberate Scale: 41 skill theories and 150+ MCP tools indexed for surgical retrieval, not brute-force context  \n\nCLIENT_VALUE: Ships working code with 80% fewer redundant model calls than ungoverned agents.  \n\nNOTES: The memory system isn't just storage—it's a strategic asset. Every retrieval is a cost/benefit decision, every skill theory a leverage point. This is how we scale autonomy without losing control.</li><li><b>Data:</b> Memory Architecture: Recall, Act, Store</li><li><b>Beverly Crusher:</b> System Health Monitoring</li></ul>\n      <p class=\"fine\"><a href=\"../index.html\">↑ Back to Story Agent overview (HTML)</a> · <a href=\"../deck.pdf\">↑ overview (PDF)</a></p>","Recap, then return to the book cover to pick the next pillar."]];
const TIMER_SECONDS = 180;

const deck=document.getElementById('deck');
SLIDES.forEach(([html,notes])=>{const s=document.createElement('section');s.className='slide';s.innerHTML=html;
  const h=s.querySelector('h2'); if(h&&notes){const p=document.createElement('p');p.className='intro';p.innerHTML=notes;h.insertAdjacentElement('afterend',p);}
  deck.appendChild(s);});
const slides=[...document.querySelectorAll('.slide')];let cur=0;const zoomers={};
function fitActive(){slides[cur].querySelectorAll('svg').forEach(svg=>{const z=zoomers[svg.dataset.zkey];if(z){try{z.resize();z.fit();z.center();}catch(e){}}});}
function render(){slides.forEach((s,i)=>s.classList.toggle('active',i===cur));document.getElementById('navcount').textContent=(cur+1)+' / '+slides.length;document.getElementById('barfill').style.width=(cur/Math.max(1,slides.length-1)*100)+'%';document.getElementById('prev').disabled=cur===0;document.getElementById('next').disabled=cur===slides.length-1;fitActive();}
function go(n){cur=Math.max(0,Math.min(slides.length-1,n));render();history.replaceState(null,'','#'+(cur+1));}
function initial(){const h=parseInt(location.hash.replace('#',''),10);return(h>=1&&h<=slides.length)?h-1:0;}
mermaid.initialize({startOnLoad:false,theme:'neutral',securityLevel:'loose',flowchart:{htmlLabels:true,curve:'basis',useMaxWidth:false}});
window.addEventListener('load',async()=>{try{await mermaid.run({querySelector:'.mermaid'});}catch(e){console.error(e);}
  document.querySelectorAll('.mermaid').forEach(pre=>{const svg=pre.querySelector('svg');if(!svg)return;const k=pre.dataset.key||('d'+Math.random());svg.dataset.zkey=k;svg.removeAttribute('style');try{zoomers[k]=svgPanZoom(svg,{zoomEnabled:true,controlIconsEnabled:true,fit:true,center:true,minZoom:0.4,maxZoom:12,zoomScaleSensitivity:0.35});}catch(e){}});
  cur=initial();render();});
let left=TIMER_SECONDS,tick=null;
function fmt(s){const m=Math.floor(Math.abs(s)/60),ss=Math.abs(s)%60;return(s<0?'-':'')+m+':'+String(ss).padStart(2,'0');}
function paint(){const t=document.getElementById('timer');t.textContent=fmt(left);t.className=left<=0?'over':left<=90?'warn':'';}
function toggleT(){if(tick){clearInterval(tick);tick=null;document.getElementById('tBtn').textContent='▶ Timer';}else{document.getElementById('tBtn').textContent='⏸ Timer';tick=setInterval(()=>{left--;paint();},1000);}}
document.getElementById('tBtn').onclick=toggleT;
document.getElementById('prev').onclick=()=>go(cur-1);
document.getElementById('next').onclick=()=>go(cur+1);
addEventListener('keydown',e=>{const k=e.key.toLowerCase();
  if(e.key==='ArrowRight'||e.key===' '||e.key==='PageDown'){e.preventDefault();go(cur+1);}
  else if(e.key==='ArrowLeft'||e.key==='PageUp'){e.preventDefault();go(cur-1);}
  else if(e.key==='Home')go(0);else if(e.key==='End')go(slides.length-1);
  else if(k==='t')toggleT();else if(k==='r'){left=TIMER_SECONDS;paint();if(tick){clearInterval(tick);tick=null;document.getElementById('tBtn').textContent='▶ Timer';}}
  else if(k==='f'){if(!document.fullscreenElement)document.documentElement.requestFullscreen();else document.exitFullscreen();}
  else if(k==='z')fitActive();});
paint();
</script>
</body>
</html>
