<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Story Agent — Infrastructure &amp; Operations</title>
<style>
  :root{ --ink:#1a202c; --muted:#4a5568; --accent:#2b6cb0; --accent2:#2c5282; --bg:#fff; --panel:#f7fafc; --border:#cbd5e0; --gold:#b7791f; }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;color:var(--ink);background:#0b1220;overflow:hidden}
  #deck{position:fixed;inset:0}
  .slide{position:absolute;inset:0;display:flex;flex-direction:column;justify-content:center;padding:5vh 7vw;background:var(--bg);opacity:0;pointer-events:none;transition:opacity .35s ease;overflow:auto}
  .slide.active{opacity:1;pointer-events:auto;z-index:2}
  .slide h1{font-size:clamp(30px,5vw,60px);margin:0 0 .18em;line-height:1.04}
  .slide h2{font-size:clamp(24px,3.6vw,44px);margin:0 0 .45em;color:var(--accent);line-height:1.08}
  .slide p,.slide li{font-size:clamp(17px,1.95vw,27px);line-height:1.5}
  .lead{font-size:clamp(19px,2.3vw,30px);color:var(--muted)}
  .kicker{font-size:clamp(13px,1.35vw,17px);letter-spacing:.14em;text-transform:uppercase;color:var(--accent);font-weight:700;margin-bottom:.5em;display:flex;gap:12px;align-items:center;flex-wrap:wrap}
  .owner{background:#edf2f7;color:var(--accent2);border-radius:999px;padding:.15em .8em;font-size:.85em;letter-spacing:.06em}
  ul{margin:.3em 0;padding-left:1.15em} li{margin:.42em 0}
  .value{margin-top:.7em;background:#ebf8ff;border-left:6px solid var(--accent);padding:12px 18px;border-radius:8px;font-size:clamp(16px,1.8vw,24px)}
  .value b{color:var(--accent2)}
  .big{font-weight:800} .accent{color:var(--accent)}
  .quote{font-size:clamp(24px,3.2vw,44px);font-weight:800;line-height:1.2;border-left:8px solid var(--accent);padding-left:26px}
  .fine{font-size:clamp(13px,1.3vw,17px);color:var(--muted)}
  .agenda{columns:2;column-gap:48px;margin-top:.4em} .agenda li{break-inside:avoid;font-size:clamp(15px,1.7vw,22px)}
  .diagram-wrap{flex:1;min-height:0;display:flex;flex-direction:column;margin-top:.4em}
  .diagram{flex:1;min-height:0;border:1px solid var(--border);border-radius:12px;background:#fcfdff;position:relative;overflow:hidden}
  .diagram .mermaid{position:absolute;inset:0;display:flex;align-items:center;justify-content:center}
  .diagram svg{width:100%!important;height:100%!important;max-width:none!important}
  .dhint{font-size:13px;color:var(--muted);margin-top:6px}
  .cols{display:grid;grid-template-columns:1fr 1fr;gap:30px;align-items:stretch;margin-top:.4em}
  .cols .diagram-wrap{height:46vh;margin-top:0}
  #bar{position:fixed;left:0;right:0;bottom:0;height:6px;background:#e2e8f0;z-index:50}#barfill{height:100%;width:0;background:linear-gradient(90deg,var(--accent),#4299e1);transition:width .35s}
  #hud{position:fixed;top:14px;right:16px;display:flex;gap:10px;align-items:center;z-index:60;font-variant-numeric:tabular-nums}
  #timer{background:rgba(15,23,42,.86);color:#fff;padding:6px 12px;border-radius:8px;font-weight:700;font-size:15px}#timer.warn{background:var(--gold)}#timer.over{background:#c53030}
  #count{background:rgba(15,23,42,.86);color:#cbd5e0;padding:6px 10px;border-radius:8px;font-size:13px}
  .btn{background:rgba(15,23,42,.86);color:#fff;border:0;padding:6px 10px;border-radius:8px;font-size:13px;cursor:pointer}.btn:hover{background:var(--accent)}
  #notes{position:fixed;left:0;right:0;bottom:6px;max-height:34vh;overflow:auto;background:#0f172a;color:#e2e8f0;padding:16px 7vw;z-index:55;transform:translateY(102%);transition:transform .3s;font-size:16px;line-height:1.55;border-top:3px solid var(--accent)}#notes.show{transform:translateY(0)}
  @media print{
    html,body{overflow:visible;height:auto;background:#fff}
    #hud,#bar,#notes,.dhint{display:none!important}
    #deck{position:static;inset:auto}
    .slide{position:relative;inset:auto;opacity:1!important;page-break-after:always;height:auto;min-height:94vh;display:flex}
    .diagram-wrap{height:58vh} .cols .diagram-wrap{height:42vh} .diagram{min-height:320px}
    .slide:last-child{page-break-after:auto}
    [id^=svg-pan-zoom-controls]{display:none!important}
  }
</style>
</head>
<body>
<div id="deck"></div>
<div id="hud">
  <button class="btn" id="notesBtn" title="Speaker notes (N)">Notes</button>
  <button class="btn" id="tBtn" title="Timer (T)">▶ Timer</button>
  <span id="timer">--:--</span><span id="count">1 / 1</span>
</div>
<div id="bar"><div id="barfill"></div></div>
<div id="notes"></div>
<script src="../../presentation/vendor/mermaid.min.js"></script>
<script src="../../presentation/vendor/svg-pan-zoom.min.js"></script>
<script>
/* Generic deck engine. Content is injected at build time by scripts/present.mjs. */
const SLIDES = [["<div class=\"kicker\"><span>Story Agent · Pillar</span></div><h1>Infrastructure &amp; Operations</h1>\n      <p class=\"lead\">How this pillar works and why it matters.</p>\n      <p class=\"fine\">Team assembled by Riker: Jean-Luc Picard, Data, Geordi La Forge, Miles Edward O'Brien.</p>\n      <p class=\"fine\"><a href=\"../index.html\">↑ Story Agent overview (HTML)</a> · <a href=\"../deck.pdf\">↑ overview (PDF)</a></p>","This is the \"Infrastructure & Operations\" pillar. Walk the sections, then return to the overview."],["<div class=\"kicker\"><span>1 / 4</span><span class=\"owner\">Jean-Luc Picard · command</span></div>\n      <h2>Sovereign Infrastructure for Autonomous Agents</h2><ul><li>Cost-Optimized Execution: Orchestrator directs work to cheapest capable model (Anthropic-free tier), with per-deliberation cost transparency (~$0.002–0.003) and auto-remediating security (WorfGate).</li><li>Stateful, Portable RAG: pgvector recall→act→store cycle compounds knowledge; retrieval is detached from vendor lock-in.</li><li>Control Plane Integrity: Live async-status tracking, timeout guardrails, and shadow-testing ensure autonomy is measurable before deployment.</li></ul>\n      <div class=\"value\"><b>Why it matters:</b> You get production-grade agent ops—cost-predictable, auditable, and incrementally autonomous—without rebuilding the wheel.</div>","<b>Jean-Luc Picard:</b> This isn’t theoretical. Every subsystem here answers a hard lesson from scaling AI in the wild: cost predictability beats raw capability, security can’t be bolted on, and partial autonomy must prove itself before full trust. We built the guardrails first."],["<div class=\"kicker\"><span>2 / 4</span><span class=\"owner\">Data · architecture</span></div>\n      <h2>Infrastructure That Enforces Operational Discipline</h2><ul><li>AWS Fargate deployment; WorfGate credential broker guarantees secrets are never logged, with auto-remediating green/yellow/red governance on every agent action</li><li>Quark routing selects the cheapest adequate model per task — premium orchestration only at tier-4 Anthropic — yielding a measured $0.002–$0.003 per deliberation with full cost attribution in the control lane</li><li>pgvector RAG pipeline (recall → act → store) runs portably across environments; async-status layer delivers live progress visibility and enforces timeout guardrails across all 150 MCP tools</li></ul>\n      <div class=\"value\"><b>Why it matters:</b> You get a self-hosted, cost-attributed, credential-safe autonomous coding platform where every architectural constraint is mechanically enforced, not aspirationally documented.</div>","<b>Data:</b> WorfGate is not a policy document — it is a runtime enforcement layer; the distinction matters for security audits. Cost figures are per-deliberation actuals, not projections, and the control lane makes them inspectable per task. Full-autonomy shadow testing is an active criterion, not a completed milestone; current deployment operates under that constraint with explicit acknowledgment."],["<div class=\"kicker\"><span>3 / 4</span><span class=\"owner\">Geordi La Forge · infrastructure</span></div>\n      <h2>Ship-Ready Infrastructure</h2><ul><li>Zero-trust execution: WorfGate isolates credentials, auto-remediates failures (green/yellow/red), and enforces runtime guardrails without manual intervention.</li><li>Cost-optimized scale: Quark routing dynamically selects the cheapest adequate model per task, with control-lane attribution (~$0.002-0.003/deliberation).</li><li>Stateful autonomy: RAG (pgvector) compounds knowledge across runs; async-status provides live progress + timeout failsafes for long operations.</li></ul>\n      <div class=\"value\"><b>Why it matters:</b> Self-healing, cost-transparent infrastructure that scales with demand while keeping secrets and failures contained.</div>","<b>Geordi La Forge:</b> Our stack is built for real-world ops—credentials never hit logs, models downgrade gracefully under load, and RAG ensures actions compound over time. This isn’t just \"works on my machine\"; it’s built to survive production."],["<div class=\"kicker\"><span>4 / 4</span><span class=\"owner\">Miles Edward O'Brien · devops</span></div>\n      <h2>Miles Edward O'Brien's view</h2><ul><li>Automated deployment to AWS Fargate for scalable and reliable execution</li><li>Implemented WorfGate credential broker for secure secrets management and auto-remediating governor for fault tolerance</li><li>Integrated async-status for live progress tracking and timeout guardrails to prevent resource exhaustion</li></ul>\n      <div class=\"value\"><b>Why it matters:</b> By prioritizing infrastructure and operations, we ensure the Story Agent platform delivers consistent and reliable performance for our clients.</div>","<b>Miles Edward O'Brien:</b> Our focus on infrastructure and operations enables us to identify and address potential integration problems before they become critical issues. We've implemented robust security measures, such as secure secrets management, to protect client data. By optimizing our deployment process and monitoring system performance, we can guarantee high availability and reliability for our clients."],["<div class=\"kicker\"><span>End of pillar</span></div><h2>Infrastructure &amp; Operations — recap</h2>\n      <ul><li><b>Jean-Luc Picard:</b> Sovereign Infrastructure for Autonomous Agents</li><li><b>Data:</b> Infrastructure That Enforces Operational Discipline</li><li><b>Geordi La Forge:</b> Ship-Ready Infrastructure</li><li><b>Miles Edward O'Brien:</b> Miles Edward O'Brien's view</li></ul>\n      <p class=\"fine\"><a href=\"../index.html\">↑ Back to Story Agent overview (HTML)</a> · <a href=\"../deck.pdf\">↑ overview (PDF)</a></p>","Recap, then return to the book cover to pick the next pillar."]];
const TIMER_SECONDS = 180;

const deck=document.getElementById('deck');
SLIDES.forEach(([html])=>{const s=document.createElement('section');s.className='slide';s.innerHTML=html;deck.appendChild(s);});
const slides=[...document.querySelectorAll('.slide')];let cur=0;const zoomers={};
function fitActive(){slides[cur].querySelectorAll('svg').forEach(svg=>{const z=zoomers[svg.dataset.zkey];if(z){try{z.resize();z.fit();z.center();}catch(e){}}});}
function render(){slides.forEach((s,i)=>s.classList.toggle('active',i===cur));document.getElementById('count').textContent=(cur+1)+' / '+slides.length;document.getElementById('barfill').style.width=(cur/Math.max(1,slides.length-1)*100)+'%';document.getElementById('notes').innerHTML=(SLIDES[cur]&&SLIDES[cur][1])||'<i>No notes.</i>';fitActive();}
function go(n){cur=Math.max(0,Math.min(slides.length-1,n));render();history.replaceState(null,'','#'+(cur+1));}
function initial(){const h=parseInt(location.hash.replace('#',''),10);return(h>=1&&h<=slides.length)?h-1:0;}
mermaid.initialize({startOnLoad:false,theme:'neutral',securityLevel:'loose',flowchart:{htmlLabels:true,curve:'basis',useMaxWidth:false}});
window.addEventListener('load',async()=>{try{await mermaid.run({querySelector:'.mermaid'});}catch(e){console.error(e);}
  document.querySelectorAll('.mermaid').forEach(pre=>{const svg=pre.querySelector('svg');if(!svg)return;const k=pre.dataset.key||('d'+Math.random());svg.dataset.zkey=k;svg.removeAttribute('style');try{zoomers[k]=svgPanZoom(svg,{zoomEnabled:true,controlIconsEnabled:true,fit:true,center:true,minZoom:0.4,maxZoom:12,zoomScaleSensitivity:0.35});}catch(e){}});
  cur=initial();render();});
let left=TIMER_SECONDS,tick=null;
function fmt(s){const m=Math.floor(Math.abs(s)/60),ss=Math.abs(s)%60;return(s<0?'-':'')+m+':'+String(ss).padStart(2,'0');}
function paint(){const t=document.getElementById('timer');t.textContent=fmt(left);t.className=left<=0?'over':left<=90?'warn':'';}
function toggleT(){if(tick){clearInterval(tick);tick=null;document.getElementById('tBtn').textContent='▶ Timer';}else{document.getElementById('tBtn').textContent='⏸ Timer';tick=setInterval(()=>{left--;paint();},1000);}}
document.getElementById('tBtn').onclick=toggleT;
document.getElementById('notesBtn').onclick=()=>document.getElementById('notes').classList.toggle('show');
addEventListener('keydown',e=>{const k=e.key.toLowerCase();
  if(e.key==='ArrowRight'||e.key===' '||e.key==='PageDown'){e.preventDefault();go(cur+1);}
  else if(e.key==='ArrowLeft'||e.key==='PageUp'){e.preventDefault();go(cur-1);}
  else if(e.key==='Home')go(0);else if(e.key==='End')go(slides.length-1);
  else if(k==='n')document.getElementById('notes').classList.toggle('show');
  else if(k==='t')toggleT();else if(k==='r'){left=TIMER_SECONDS;paint();if(tick){clearInterval(tick);tick=null;document.getElementById('tBtn').textContent='▶ Timer';}}
  else if(k==='f'){if(!document.fullscreenElement)document.documentElement.requestFullscreen();else document.exitFullscreen();}
  else if(k==='z')fitActive();});
paint();
</script>
</body>
</html>
