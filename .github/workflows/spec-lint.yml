name: spec-lint

# Anti-rot guard for the API contract: lint the live OpenAPI spec on any change to it.
# Frugal — uses npx (no committed devDependency), fails only on error-severity findings.
on:
  push:
    paths: ['specs/**', '.spectral.yaml', '.github/workflows/spec-lint.yml']
  pull_request:
    paths: ['specs/**', '.spectral.yaml']

jobs:
  spectral:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Lint OpenAPI (live spec)
        run: npx --yes @stoplight/spectral-cli@^6 lint specs/openapi.current.yaml --ruleset .spectral.yaml --fail-severity=error
