name: Auto-Migrate Supabase on Deploy

on:
  push:
    branches:
      - main
      - dev
    paths:
      - 'supabase/**'
      - 'package.json'
      - '.github/workflows/supabase-auto-migrate.yml'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

env:
  SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
  SUPABASE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
  SUPABASE_REST_ENDPOINT: ${{ secrets.SUPABASE_URL }}/rest/v1
  NODE_ENV: ${{ github.ref == 'refs/heads/main' && 'production' || 'staging' }}

jobs:
  auto-migrate:
    name: Run Supabase Migrations
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Validate credentials
        run: |
          if [ -z "${{ secrets.SUPABASE_URL }}" ]; then
            echo "❌ SUPABASE_URL secret not configured"
            exit 1
          fi
          if [ -z "${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" ]; then
            echo "❌ SUPABASE_SERVICE_ROLE_KEY secret not configured"
            exit 1
          fi
          echo "✅ Credentials validated"

      - name: Detect changed migration files
        id: detect
        run: |
          CHANGED_MIGRATIONS=$(git diff origin/main...HEAD --name-only supabase/ | grep '\.sql$' || true)
          if [ -z "$CHANGED_MIGRATIONS" ]; then
            echo "no_changes=true" >> $GITHUB_OUTPUT
            echo "ℹ️  No migration files changed"
          else
            echo "no_changes=false" >> $GITHUB_OUTPUT
            echo "🔍 Changed migration files:"
            echo "$CHANGED_MIGRATIONS"
          fi

      - name: Test connectivity
        run: npm run db:migrate:test

      - name: Run auto-migrations
        if: steps.detect.outputs.no_changes == 'false'
        run: npm run db:auto-migrate

      - name: Verify database integrity
        run: |
          echo "Verifying database integrity..."
          curl -s -X GET "${{ secrets.SUPABASE_URL }}/rest/v1/sa_projects?limit=1" \
            -H "apikey: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            -H "Content-Type: application/json" > /dev/null && echo "✅ Database is accessible" || exit 1

      - name: Seed crew baseline memories (if needed)
        if: github.ref == 'refs/heads/main'
        continue-on-error: true
        run: npm run crew:seed-memories

      - name: Post results
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const status = '${{ job.status }}'
            const message = status === 'success' 
              ? '✅ Supabase auto-migrations completed'
              : '❌ Supabase auto-migrations failed'
            
            console.log(message)

  notify-slack:
    name: Notify Slack
    runs-on: ubuntu-latest
    needs: auto-migrate
    if: always()
    steps:
      - name: Send notification
        if: ${{ secrets.SLACK_WEBHOOK_URL }}
        uses: slackapi/slack-github-action@v1.24.0
        with:
          webhook-url: ${{ secrets.SLACK_WEBHOOK_URL }}
          payload: |
            {
              "text": "Supabase Auto-Migration: ${{ needs.auto-migrate.result }}",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Supabase Auto-Migration*\nStatus: ${{ needs.auto-migrate.result }}\nBranch: `${{ github.ref }}`\nCommit: `${{ github.sha }}`"
                  }
                }
              ]
            }
