name: Supabase Migrate (CLI db push)

# Applies pending migrations in supabase/migrations/ to the cloud project via the Supabase CLI.
# Replaces the old npm/RPC approach. Gated on SUPABASE_ACCESS_TOKEN so push runs skip cleanly
# until the token + DB password are configured as repo secrets.
#
# One-time setup (repo secrets): SUPABASE_ACCESS_TOKEN, SUPABASE_DB_PASSWORD.
# Optional repo var: SUPABASE_PROJECT_REF (defaults to the story-agent cloud project).

on:
  push:
    branches: [ main ]
    paths:
      - 'supabase/migrations/**'
      - '.github/workflows/supabase-auto-migrate.yml'
  workflow_dispatch:

concurrency:
  group: supabase-migrate
  cancel-in-progress: false

jobs:
  db-push:
    name: supabase db push
    runs-on: ubuntu-latest
    # Gate on a repo VARIABLE (not a secret): `secrets.*` is NOT permitted in a job-level `if:` — it
    # makes the workflow invalid, so GitHub failed it (0 jobs) on EVERY push regardless of paths. Set
    # repo var SUPABASE_AUTO_MIGRATE=true (plus secrets SUPABASE_ACCESS_TOKEN + SUPABASE_DB_PASSWORD)
    # to enable; otherwise this job skips cleanly (no red failures before setup).
    if: ${{ vars.SUPABASE_AUTO_MIGRATE == 'true' }}
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      PROJECT_REF: ${{ vars.SUPABASE_PROJECT_REF || 'rpkkkbufdwxmjaerbhbn' }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link project
        run: supabase link --project-ref "$PROJECT_REF"

      - name: Push migrations (dry run)
        run: supabase db push --dry-run

      - name: Push migrations
        run: supabase db push
