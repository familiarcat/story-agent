name: WorfGate Security Audit Check

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  audit-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.12.3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Run Security Audit Summary
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          WORFGATE_AUDIT_MAX: 100
          STORY_AGENT_PATH: ${{ github.workspace }}
        run: |
          if [ -z "$SUPABASE_URL" ]; then
            echo "::notice::SUPABASE_URL not configured — skipping live WorfGate audit query (CI stays green)."
            exit 0
          fi
          pnpm exec tsx scripts/check-recent-audits.ts
