name: WorfGate Security Audit Check

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  audit-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        # Version comes from package.json "packageManager" (single source of truth) — do NOT also pin
        # "version:" here, or pnpm/action-setup errors "Multiple versions of pnpm specified".

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Run Security Audit Summary
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          SUPABASE_CLOUD_URL: ${{ secrets.SUPABASE_CLOUD_URL }}
          SUPABASE_CLOUD_KEY: ${{ secrets.SUPABASE_CLOUD_KEY }}
          WORFGATE_AUDIT_MAX: 100
          STORY_AGENT_PATH: ${{ github.workspace }}
        run: bash .github/scripts/run-worfgate-audit-check.sh "npx tsx scripts/check-recent-audits.ts"
