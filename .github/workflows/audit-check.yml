name: WorfGate Security Audit Check

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  audit-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Run Security Audit Summary
        run: npx ts-node scripts/check-recent-audits.ts
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          WORFGATE_AUDIT_MAX: 100
          STORY_AGENT_PATH: ${{ github.workspace }}