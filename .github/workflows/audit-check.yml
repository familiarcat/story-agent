name: WorfGate Security Audit Check

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  audit-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        # Version comes from package.json "packageManager" (single source of truth) — do NOT also pin
        # "version:" here, or pnpm/action-setup errors "Multiple versions of pnpm specified".

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Run Security Audit Summary
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          SUPABASE_CLOUD_URL: ${{ secrets.SUPABASE_CLOUD_URL }}
          SUPABASE_CLOUD_KEY: ${{ secrets.SUPABASE_CLOUD_KEY }}
          WORFGATE_AUDIT_MAX: 100
          STORY_AGENT_PATH: ${{ github.workspace }}
        run: |
          if [ -n "$SUPABASE_CLOUD_URL" ] && [ -n "$SUPABASE_CLOUD_KEY" ]; then
            export SUPABASE_URL="$SUPABASE_CLOUD_URL"
            export SUPABASE_KEY="$SUPABASE_CLOUD_KEY"
            echo "::notice::Using SUPABASE_CLOUD_URL/SUPABASE_CLOUD_KEY for WorfGate audit query."
          fi

          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_KEY" ]; then
            echo "::notice::SUPABASE_URL/SUPABASE_KEY not fully configured — skipping live WorfGate audit query (CI stays green)."
            exit 0
          fi

          if [[ "$SUPABASE_URL" == http://127.0.0.1* || "$SUPABASE_URL" == http://localhost* ]]; then
            echo "::notice::SUPABASE_URL points to a local endpoint ($SUPABASE_URL) — skipping live WorfGate audit query in CI (CI stays green)."
            exit 0
          fi

          pnpm exec tsx scripts/check-recent-audits.ts
