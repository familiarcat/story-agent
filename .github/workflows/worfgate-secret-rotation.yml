name: WorfGate Secret Rotation

on:
  schedule:
    - cron: '17 8 * * 1'
  workflow_dispatch:
    inputs:
      apply:
        description: "Write secret updates to AWS Secrets Manager"
        type: boolean
        default: false
      trigger_rotation:
        description: "Call rotate-secret after update (requires configured rotation Lambda)"
        type: boolean
        default: false
      secret_id:
        description: "AWS secret id/name"
        required: false
        default: "story-agent/aha"

permissions:
  id-token: write
  contents: read

concurrency:
  group: worfgate-secret-rotation
  cancel-in-progress: false

jobs:
  rotate:
    runs-on: ubuntu-latest
    if: ${{ vars.AWS_REGION != '' && vars.AWS_DEPLOY_ROLE_ARN != '' }}
    env:
      npm_config_yes: "true"
      AWS_REGION: ${{ vars.AWS_REGION }}
      AHA_DOMAIN: ${{ secrets.AHA_DOMAIN }}
      AHA_API_KEY: ${{ secrets.AHA_API_KEY }}
      SECRET_ID: ${{ github.event.inputs.secret_id || 'story-agent/aha' }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Validate required secret inputs
        run: |
          if [ -z "$AHA_DOMAIN" ] || [ -z "$AHA_API_KEY" ]; then
            echo "::error::AHA_DOMAIN and AHA_API_KEY repo secrets are required for WorfGate secret sync."
            exit 1
          fi

      - name: Dry-run secret sync (scheduled default)
        if: ${{ github.event_name == 'schedule' || github.event.inputs.apply != 'true' }}
        run: |
          pnpm run secrets:sync:aws:dry -- --secret-id "$SECRET_ID"

      - name: Apply secret sync
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.apply == 'true' && github.event.inputs.trigger_rotation != 'true' }}
        run: |
          pnpm run secrets:sync:aws -- --secret-id "$SECRET_ID"

      - name: Apply secret sync and trigger rotation
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.apply == 'true' && github.event.inputs.trigger_rotation == 'true' }}
        run: |
          pnpm run secrets:rotate:aws -- --secret-id "$SECRET_ID"
