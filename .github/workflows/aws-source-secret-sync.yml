name: AWS Source Secret Sync

on:
  schedule:
    - cron: '37 8 * * 1'
  workflow_dispatch:
    inputs:
      apply:
        description: "Write AWS secret values into GitHub repo secrets"
        type: boolean
        default: false
      secret_id:
        description: "AWS secret id/name"
        required: false
        default: "story-agent/aha"
      repo:
        description: "Target GitHub repository (owner/name)"
        required: false
        default: "familiarcat/story-agent"

permissions:
  id-token: write
  contents: read
  actions: write

concurrency:
  group: aws-source-secret-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    if: ${{ vars.AWS_REGION != '' && vars.AWS_DEPLOY_ROLE_ARN != '' }}
    env:
      npm_config_yes: "true"
      AWS_REGION: ${{ vars.AWS_REGION }}
      SECRET_ID: ${{ github.event.inputs.secret_id || 'story-agent/aha' }}
      TARGET_REPO: ${{ github.event.inputs.repo || github.repository }}
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Validate source secret exists
        run: |
          aws --no-cli-pager secretsmanager describe-secret --secret-id "$SECRET_ID" >/dev/null

      - name: Dry-run AWS -> GitHub sync (scheduled default)
        if: ${{ github.event_name == 'schedule' || github.event.inputs.apply != 'true' }}
        run: |
          pnpm run secrets:sync:github-from-aws:dry -- --secret-id "$SECRET_ID" --repo "$TARGET_REPO"

      - name: Apply AWS -> GitHub sync
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.apply == 'true' }}
        run: |
          pnpm run secrets:sync:github-from-aws -- --secret-id "$SECRET_ID" --repo "$TARGET_REPO"
