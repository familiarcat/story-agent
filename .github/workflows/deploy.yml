name: deploy-fargate

# Staggered Terraform + Docker CI/CD (crew deploy-optimization plan).
#   detect â†’ (build_mcp â€– build_ui, only if app changed) â†’ deploy (resilient apply)
# Infra-only changes SKIP the image builds entirely (the slow part) and reuse the live :latest images,
# so UI/infra iteration isn't blocked by a full rebuild. Native ARM64 runners (Graviton, no QEMU).

on:
  workflow_dispatch:
    inputs:
      apply:
        description: "Run terraform apply (otherwise plan only)"
        type: boolean
        default: false
  push:
    branches: [main]
    paths: ["packages/**", "docker/**", "terraform/**", ".github/workflows/deploy.yml"]

permissions:
  id-token: write   # GitHub OIDC â†’ AWS
  contents: read

concurrency:
  group: deploy-fargate
  cancel-in-progress: false

jobs:
  # â”€â”€ Decide what changed: app code (â†’ rebuild images) vs infra-only (â†’ skip builds) â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
  detect:
    runs-on: ubuntu-latest
    if: ${{ vars.AWS_REGION != '' && vars.AWS_DEPLOY_ROLE_ARN != '' }}
    outputs:
      app: ${{ steps.f.outputs.app }}
      infra: ${{ steps.f.outputs.infra }}
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 2 }
      - id: f
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "app=true"  >> "$GITHUB_OUTPUT"; echo "infra=true" >> "$GITHUB_OUTPUT"
            echo "manual dispatch â†’ full deploy"; exit 0
          fi
          BASE="${{ github.event.before }}"
          CH=$(git diff --name-only "$BASE" "${{ github.sha }}" 2>/dev/null || git diff --name-only HEAD^ HEAD)
          echo "changed files:"; echo "$CH"
          echo "$CH" | grep -qE '^(packages|docker)/'                 && echo "app=true"   >> "$GITHUB_OUTPUT" || echo "app=false"   >> "$GITHUB_OUTPUT"
          echo "$CH" | grep -qE '^(terraform/|\.github/workflows/deploy\.yml)' && echo "infra=true" >> "$GITHUB_OUTPUT" || echo "infra=false" >> "$GITHUB_OUTPUT"

  build_mcp:
    needs: detect
    if: ${{ needs.detect.outputs.app == 'true' }}
    runs-on: ubuntu-24.04-arm
    outputs:
      digest: ${{ steps.b.outputs.digest }}
    env: { ECR_REGISTRY: "${{ vars.ECR_REGISTRY }}" }
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with: { role-to-assume: "${{ vars.AWS_DEPLOY_ROLE_ARN }}", aws-region: "${{ vars.AWS_REGION }}" }
      - uses: aws-actions/amazon-ecr-login@v2
      - uses: docker/setup-buildx-action@v3
      - id: b
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.mcp
          platforms: linux/arm64
          push: true
          build-args: |
            GIT_SHA=${{ github.sha }}
          tags: ${{ env.ECR_REGISTRY }}/story-agent-mcp:latest,${{ env.ECR_REGISTRY }}/story-agent-mcp:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build_ui:
    needs: detect
    if: ${{ needs.detect.outputs.app == 'true' }}
    runs-on: ubuntu-24.04-arm
    outputs:
      digest: ${{ steps.b.outputs.digest }}
    env: { ECR_REGISTRY: "${{ vars.ECR_REGISTRY }}" }
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with: { role-to-assume: "${{ vars.AWS_DEPLOY_ROLE_ARN }}", aws-region: "${{ vars.AWS_REGION }}" }
      - uses: aws-actions/amazon-ecr-login@v2
      - uses: docker/setup-buildx-action@v3
      - id: b
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.ui
          platforms: linux/arm64
          push: true
          tags: ${{ env.ECR_REGISTRY }}/story-agent-ui:latest,${{ env.ECR_REGISTRY }}/story-agent-ui:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Required security gate BEFORE any apply (crew air-tight deploy plan, OBS 05309228 â€” Worf/Yar):
  # the WorfGate audit must pass before we touch production. Skips green when Supabase cloud creds
  # are missing/incomplete or point at localhost (same guard as audit-check.yml), so it never
  # false-fails before setup.
  security_gate:
    runs-on: ubuntu-latest
    if: ${{ vars.AWS_REGION != '' && vars.AWS_DEPLOY_ROLE_ARN != '' }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with: { node-version: '22', cache: 'pnpm' }
      - run: pnpm install --frozen-lockfile --ignore-scripts
      - name: WorfGate security audit
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          SUPABASE_CLOUD_URL: ${{ secrets.SUPABASE_CLOUD_URL }}
          SUPABASE_CLOUD_KEY: ${{ secrets.SUPABASE_CLOUD_KEY }}
          WORFGATE_AUDIT_MAX: 100
          STORY_AGENT_PATH: ${{ github.workspace }}
        run: bash .github/scripts/run-worfgate-audit-check.sh "pnpm exec tsx scripts/check-recent-audits.ts"

  deploy:
    needs: [detect, build_mcp, build_ui, security_gate]
    # Run when something changed, builds (if any) didn't fail, AND the security gate passed. Skipped
    # builds are fine (infra-only); a FAILED security_gate blocks the deploy (incl. apply).
    if: >-
      ${{ always()
        && (needs.detect.outputs.app == 'true' || needs.detect.outputs.infra == 'true')
        && needs.build_mcp.result != 'failure'
        && needs.build_ui.result != 'failure'
        && needs.security_gate.result == 'success' }}
    runs-on: ubuntu-latest
    env:
      AWS_REGION: ${{ vars.AWS_REGION }}
      ECR_REGISTRY: ${{ vars.ECR_REGISTRY }}
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with: { role-to-assume: "${{ vars.AWS_DEPLOY_ROLE_ARN }}", aws-region: "${{ vars.AWS_REGION }}" }
      - uses: hashicorp/setup-terraform@v3
        with: { terraform_version: "1.5.7" }  # match the admin's local version (no state-format drift)

      - name: Resolve image refs (built digest, else REUSE the currently-deployed image)
        id: img
        # Crew quota=2 fix (O'Brien #12): on infra-only deploys (no build), reuse the EXACT image
        # already on the live task definition â€” NOT :latest â€” so the task def doesn't change, ECS
        # doesn't roll a new task, and there's no vCPU contention. Only a real image change rolls
        # (then stop-before-start fits quota=2).
        run: |
          MCP_DIGEST="${{ needs.build_mcp.outputs.digest }}"
          UI_DIGEST="${{ needs.build_ui.outputs.digest }}"
          cur() { aws ecs describe-task-definition --task-definition "$1" --region "$AWS_REGION" \
                    --query 'taskDefinition.containerDefinitions[0].image' --output text 2>/dev/null; }
          if [ -n "$MCP_DIGEST" ]; then MCP="${ECR_REGISTRY}/story-agent-mcp@${MCP_DIGEST}"
          else MCP="$(cur story-agent-mcp)"; [ -z "$MCP" ] || [ "$MCP" = "None" ] && MCP="${ECR_REGISTRY}/story-agent-mcp:latest"; fi
          if [ -n "$UI_DIGEST" ]; then UI="${ECR_REGISTRY}/story-agent-ui@${UI_DIGEST}"
          else UI="$(cur story-agent-ui)"; [ -z "$UI" ] || [ "$UI" = "None" ] && UI="${ECR_REGISTRY}/story-agent-ui:latest"; fi
          echo "mcp=$MCP" >> "$GITHUB_OUTPUT"; echo "ui=$UI" >> "$GITHUB_OUTPUT"
          echo "MCP â†’ $MCP"; echo "UI â†’ $UI"

      - name: Terraform init + plan
        working-directory: terraform
        run: |
          terraform init -input=false
          terraform plan -input=false -out=tfplan \
            -var "mcp_image=${{ steps.img.outputs.mcp }}" \
            -var "ui_image=${{ steps.img.outputs.ui }}"

      - name: Terraform apply
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.apply == 'true' }}
        working-directory: terraform
        run: terraform apply -input=false -auto-approve tfplan

      # Air-tight gate (crew mission deploy-airtight-strategy, OBS 05309228): an apply is NOT done
      # until the rolled tasks are actually HEALTHY. Without this, a push went green while the live
      # service crash-looped (the 0.0.0.0-bind bug was invisible). `ecs wait services-stable` fails
      # the job if either service can't reach running=desired + deployment COMPLETED within ~10min,
      # then we confirm the live ALB /rag/health reports the NEW gitSha (best-effort if ALB is private).
      - name: Post-deploy health gate (apply only)
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.apply == 'true' }}
        run: |
          set -euo pipefail
          echo "Waiting for ECS services to converge (rollout COMPLETED, running=desired)â€¦"
          # Drain-tolerant bounded poll (crew remediation, RAG 186). Replaces `aws ecs wait
          # services-stable`, which fixed-times-out at ~10m while OLD tasks are still draining even
          # though the NEW tasks are healthy â€” causing a false-red deploy. We wait for the PRIMARY
          # deployment to report COMPLETED with running=desired, on a 20m budget.
          deadline=$(( $(date +%s) + 1200 ))
          while :; do
            stable=1
            for svc in story-agent-mcp story-agent-ui; do
              read -r rollout running desired <<< "$(aws ecs describe-services \
                --cluster story-agent --services "$svc" --region "$AWS_REGION" \
                --query 'services[0].[deployments[?status==`PRIMARY`].rolloutState | [0], runningCount, desiredCount]' \
                --output text)"
              echo "  $svc â†’ rollout=$rollout running=$running desired=$desired"
              if [ "$rollout" != "COMPLETED" ] || [ "$running" != "$desired" ]; then stable=0; fi
            done
            if [ "$stable" = "1" ]; then echo "::notice::ECS services converged (rollout COMPLETED, running=desired)."; break; fi
            if [ "$(date +%s)" -ge "$deadline" ]; then
              echo "::error::ECS services did not converge within 20m â€” rolled tasks are unhealthy. Deploy FAILED."; exit 1
            fi
            sleep 15
          done
          # Liveness on a REAL route: the UI target group health-checks /dashboard (not /rag/health,
          # which 404s). Non-fatal â€” convergence above is the gate. -L follows the HTTP:80â†’HTTPS:443
          # redirect; -k tolerates the ALB-DNS cert mismatch (cert is issued for the subdomain).
          ALB=$(aws elbv2 describe-load-balancers --names story-agent-alb --region "$AWS_REGION" \
                  --query 'LoadBalancers[0].DNSName' --output text 2>/dev/null || echo "")
          if [ -n "$ALB" ]; then
            CODE=$(curl -ksL -o /dev/null -w '%{http_code}' --max-time 12 "http://$ALB/dashboard" || echo "000")
            if [ "$CODE" = "200" ]; then echo "::notice::Live check OK â€” UI /dashboard returned 200."; else echo "::warning::UI /dashboard returned $CODE (convergence gate already passed)."; fi
          fi

      # Standing guarantee for the live approval channel: assert the ElastiCache cluster still has
      # TLS-in-transit + required mode + AUTH (the 2026-06-26 hardening). Read-only; runs every deploy.
      - name: Verify Redis security posture (live)
        run: |
          read -r TRANSIT MODE AUTH <<< "$(aws elasticache describe-replication-groups \
            --replication-group-id story-agent-redis --region "$AWS_REGION" \
            --query 'ReplicationGroups[0].[TransitEncryptionEnabled,TransitEncryptionMode,AuthTokenEnabled]' \
            --output text)"
          echo "Redis posture â†’ transit=$TRANSIT mode=$MODE auth=$AUTH"
          if [ "$TRANSIT" = "True" ] && [ "$MODE" = "required" ] && [ "$AUTH" = "True" ]; then
            echo "::notice::Redis security posture verified (TLS required + AUTH)."
          else
            echo "::error::Redis security posture regressed â€” want transit=True mode=required auth=True"
            exit 1
          fi
