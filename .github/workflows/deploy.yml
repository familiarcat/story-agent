name: deploy-fargate

# Terraform + Docker CI/CD for the Story Agent crew backend.
# Build → push to ECR → terraform apply. Runs in CI (no Claude/Anthropic cost — the crew's
# OpenRouter LLM usage is the runtime path; this pipeline is pure infra).
#
# Setup (one-time): create an IAM OIDC role for GitHub Actions and set repo variables:
#   AWS_DEPLOY_ROLE_ARN, AWS_REGION (us-east-2), ECR_REGISTRY (<acct>.dkr.ecr.<region>.amazonaws.com)
# Secrets story-agent/aha + story-agent/runtime must already exist (pnpm run aws-secrets:put).

on:
  workflow_dispatch:
    inputs:
      apply:
        description: "Run terraform apply (otherwise plan only)"
        type: boolean
        default: false
  push:
    branches: [main]
    paths: ["packages/**", "docker/**", "terraform/**", ".github/workflows/deploy.yml"]

permissions:
  id-token: write   # GitHub OIDC → AWS
  contents: read

concurrency:
  group: deploy-fargate
  cancel-in-progress: false

jobs:
  build-and-deploy:
    # Native ARM64 runner: Fargate runs ARM64/Graviton (terraform/ecs.tf), so building on an
    # amd64 runner forced slow QEMU emulation (5-10x). Building natively here removes emulation —
    # dramatically fewer minutes — while keeping the cheaper Graviton runtime.
    runs-on: ubuntu-24.04-arm
    # Only run when the deploy repo vars are configured — otherwise skip cleanly
    # (push-triggered runs no longer fail before AWS_DEPLOY_ROLE_ARN/AWS_REGION are set).
    if: ${{ vars.AWS_REGION != '' && vars.AWS_DEPLOY_ROLE_ARN != '' }}
    env:
      AWS_REGION: ${{ vars.AWS_REGION }}
      ECR_REGISTRY: ${{ vars.ECR_REGISTRY }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push MCP server image
        id: build_mcp
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.mcp
          platforms: linux/arm64
          push: true
          tags: ${{ env.ECR_REGISTRY }}/story-agent-mcp:latest,${{ env.ECR_REGISTRY }}/story-agent-mcp:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push UI image
        id: build_ui
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.ui
          platforms: linux/arm64
          push: true
          tags: ${{ env.ECR_REGISTRY }}/story-agent-ui:latest,${{ env.ECR_REGISTRY }}/story-agent-ui:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - uses: hashicorp/setup-terraform@v3
        with:
          # Pin to the admin's local version so the shared S3 state never gets format-upgraded
          # out from under a 1.5.7 local apply (Yar/O'Brien: avoid version drift on shared state).
          terraform_version: "1.5.7"

      - name: Terraform init + plan
        working-directory: terraform
        # Pin the freshly-built images by DIGEST (Data's reproducibility rule) so the apply
        # deploys exactly what CI built — never a mutable :latest.
        env:
          MCP_IMAGE: ${{ env.ECR_REGISTRY }}/story-agent-mcp@${{ steps.build_mcp.outputs.digest }}
          UI_IMAGE: ${{ env.ECR_REGISTRY }}/story-agent-ui@${{ steps.build_ui.outputs.digest }}
        run: |
          terraform init -input=false
          terraform plan -input=false -out=tfplan \
            -var "mcp_image=${MCP_IMAGE}" \
            -var "ui_image=${UI_IMAGE}"

      - name: Terraform apply
        if: github.event.inputs.apply == 'true'
        working-directory: terraform
        run: terraform apply -input=false -auto-approve tfplan
