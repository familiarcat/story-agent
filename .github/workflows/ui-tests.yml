name: UI Automated Tests

on:
  pull_request:
    branches:
      - main
    paths:
      - 'packages/ui/**'
      - 'packages/shared/**'
      - '.github/workflows/ui-tests.yml'
      - 'playwright.config.ts'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke-tests:
    name: Smoke Tests (Chromium)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'pnpm'

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install chromium

      - name: Start services
        run: |
          # Start Next.js dev server in background
          pnpm dev > /tmp/pnpm-dev.log 2>&1 &
          DEV_PID=$!
          echo "DEV_PID=$DEV_PID" >> $GITHUB_ENV

      - name: Wait for services
        run: |
          npx wait-on http://localhost:3000 -t 60000 || {
            echo "Service startup failed. Logs:"
            cat /tmp/pnpm-dev.log
            exit 1
          }

      - name: Run Playwright smoke tests
        run: pnpm --filter @story-agent/ui run test:e2e:smoke
        continue-on-error: false

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-smoke-results
          path: packages/ui/test-results/
          retention-days: 7

      - name: Comment PR with test results
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const resultsPath = 'packages/ui/test-results/results.json';

            if (fs.existsSync(resultsPath)) {
              const results = JSON.parse(fs.readFileSync(resultsPath, 'utf-8'));
              const passed = results.stats.expected || 0;
              const failed = results.stats.unexpected || 0;
              const flaky = results.stats.flaky || 0;

              const comment = `## UI Test Results

**Smoke Tests (Chromium):**
- ✅ Passed: ${passed}
- ❌ Failed: ${failed}
- ⚠️ Flaky: ${flaky}

[View Full Report](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})
              `;

              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: comment
              });
            }

      - name: Cleanup
        if: always()
        run: |
          if [ ! -z "$DEV_PID" ]; then
            kill $DEV_PID 2>/dev/null || true
          fi

  full-tests:
    name: Full Tests (${{ matrix.browser }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: github.event.pull_request.draft == false

    strategy:
      fail-fast: false
      matrix:
        browser: [firefox, webkit]
        shard: [1, 2]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'pnpm'

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install ${{ matrix.browser }}

      - name: Start services
        run: |
          pnpm dev > /tmp/pnpm-dev.log 2>&1 &
          echo "DEV_PID=$!" >> $GITHUB_ENV

      - name: Wait for services
        run: npx wait-on http://localhost:3000 -t 60000

      - name: Run Playwright tests
        run: pnpm --filter @story-agent/ui run test:e2e --project=${{ matrix.browser }} --shard=${{ matrix.shard }}/2
        continue-on-error: true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-${{ matrix.browser }}-shard-${{ matrix.shard }}-results
          path: packages/ui/test-results/
          retention-days: 7

      - name: Cleanup
        if: always()
        run: |
          if [ ! -z "$DEV_PID" ]; then
            kill $DEV_PID 2>/dev/null || true
          fi

  merge-results:
    name: Merge Test Results
    runs-on: ubuntu-latest
    if: always()
    needs: [smoke-tests]

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-results

      - name: Merge results
        run: |
          mkdir -p merged-results

          # Combine all JSON results
          echo '{"suites": [], "tests": [], "passes": 0, "failures": 0}' > merged-results/combined.json

          # Count results across all shards
          TOTAL_PASSED=0
          TOTAL_FAILED=0

          for results_dir in all-results/*/; do
            if [ -f "$results_dir/results.json" ]; then
              PASSED=$(jq '.stats.expected // 0' "$results_dir/results.json")
              FAILED=$(jq '.stats.unexpected // 0' "$results_dir/results.json")
              TOTAL_PASSED=$((TOTAL_PASSED + PASSED))
              TOTAL_FAILED=$((TOTAL_FAILED + FAILED))
            fi
          done

          echo "Total Passed: $TOTAL_PASSED"
          echo "Total Failed: $TOTAL_FAILED"

      - name: Upload merged results
        uses: actions/upload-artifact@v4
        with:
          name: playwright-merged-results
          path: merged-results/
          retention-days: 7

      - name: Report test status
        if: failure()
        run: |
          echo "::error::UI tests failed. Check artifacts for details."
          exit 1
